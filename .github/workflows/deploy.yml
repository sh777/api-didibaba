name: Deploy api-didibaba to ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ECS_USER: root
      ECS_HOST: 45.77.30.170

    steps:
    - uses: actions/checkout@v4

    - uses: 1password/load-secrets-action@v2
      with:
        export-env: true
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        TRADINGVIEW_SESSION_ID: op://didibaba.ai/api-didibaba/TRADINGVIEW_SESSION_ID
        TRADINGVIEW_SESSION_ID_SIGN: op://didibaba.ai/api-didibaba/TRADINGVIEW_SESSION_ID_SIGN
        ECS_SSH_KEY: op://didibaba.ai/api-didibaba/ECS_SSH_KEY

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ env.ECS_SSH_KEY }}

    - name: Sync code to server
      run: |
        rsync -az --delete \
          --exclude='.git' \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          --exclude='.env' \
          -e "ssh -o StrictHostKeyChecking=no" \
          ./ ${{ env.ECS_USER }}@${{ env.ECS_HOST }}:/opt/api-didibaba/

    - name: Deploy on server
      run: |
        ssh -o StrictHostKeyChecking=no ${{ env.ECS_USER }}@${{ env.ECS_HOST }} bash << REMOTE
        set -e

        echo "⚙️ Writing .env..."
        cat > /opt/api-didibaba/.env <<EOF
        TRADINGVIEW_SESSION_ID=${TRADINGVIEW_SESSION_ID}
        TRADINGVIEW_SESSION_ID_SIGN=${TRADINGVIEW_SESSION_ID_SIGN}
        TRADINGVIEW_COOKIES_FILE=/tmp/cookies.json
        EOF

        echo "🐳 Installing Docker if needed..."
        if ! command -v docker &> /dev/null; then
          apt-get update -q
          apt-get install -y docker.io
          systemctl enable docker
          systemctl start docker
        fi

        echo "🛑 Stopping old container..."
        docker stop api-didibaba 2>/dev/null || true
        docker rm api-didibaba 2>/dev/null || true

        echo "🔨 Building image..."
        cd /opt/api-didibaba
        docker build -t api-didibaba .

        echo "🚀 Starting container..."
        docker run -d \
          --name api-didibaba \
          --restart unless-stopped \
          --env-file .env \
          -p 8000:8000 \
          api-didibaba

        echo "⏳ Waiting for startup..."
        sleep 5

        echo "🧪 Health check..."
        curl -sf http://localhost:8000/health && echo "✅ Healthy!" || echo "⚠️ Health check failed"

        echo "✅ Done!"
        REMOTE
