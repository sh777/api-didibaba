name: Deploy api-didibaba to ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ECS_USER: root
      ECS_HOST: 45.77.30.170

    steps:
    - uses: actions/checkout@v4

    - uses: 1password/load-secrets-action@v2
      with:
        export-env: true
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        ECS_ROOT_PASSWORD: op://didibaba.ai/api-didibaba/ECS_ROOT_PASSWORD
        TRADINGVIEW_SESSION_ID: op://didibaba.ai/api-didibaba/TRADINGVIEW_SESSION_ID
        TRADINGVIEW_SESSION_ID_SIGN: op://didibaba.ai/api-didibaba/TRADINGVIEW_SESSION_ID_SIGN

    - name: Install sshpass + rsync
      run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass rsync

    - name: Sync code to server
      run: |
        export SSHPASS="$ECS_ROOT_PASSWORD"
        sshpass -e rsync -az --delete \
          --exclude='.git' \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          --exclude='.env' \
          -e "ssh -o StrictHostKeyChecking=no" \
          ./ ${{ env.ECS_USER }}@${{ env.ECS_HOST }}:/opt/api-didibaba/

    - name: Deploy on server
      run: |
        export SSHPASS="$ECS_ROOT_PASSWORD"
        sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.ECS_USER }}@${{ env.ECS_HOST }} /bin/bash << 'SSHEOF'
        set -e

        # Write .env
        mkdir -p /opt/api-didibaba
        cat > /opt/api-didibaba/.env << 'ENVEOF'
TRADINGVIEW_SESSION_ID=$TRADINGVIEW_SESSION_ID
TRADINGVIEW_SESSION_ID_SIGN=$TRADINGVIEW_SESSION_ID_SIGN
TRADINGVIEW_COOKIES_FILE=/tmp/cookies.json
ENVEOF

        # Rebuild api-didibaba container (no custom network needed — published on 8000)
        docker stop api-didibaba 2>/dev/null || true
        docker rm api-didibaba 2>/dev/null || true
        cd /opt/api-didibaba
        docker build -t api-didibaba .
        docker run -d \
          --name api-didibaba \
          --restart unless-stopped \
          --env-file .env \
          -p 8000:8000 \
          api-didibaba

        sleep 5
        curl -sf http://localhost:8000/health && echo "✅ api-didibaba healthy!" \
          || (echo "❌ Health check failed"; docker logs api-didibaba --tail 20; exit 1)

        # Find the nginx container (the one listening on host port 80, not 8000)
        NGINX_CTR=$(docker ps --format '{{.Names}}' | while read n; do
          docker port "$n" 2>/dev/null | grep -q ":80 ->" && echo "$n" && break
        done)
        echo "nginx container: $NGINX_CTR"

        if [ -n "$NGINX_CTR" ]; then
          # Get bridge gateway IP so nginx container can reach host port 8000
          HOST_GW=$(docker network inspect bridge --format='{{range .IPAM.Config}}{{.Gateway}}{{end}}' 2>/dev/null || echo "172.17.0.1")
          echo "Host gateway: $HOST_GW"

          # Write nginx vhost config directly into the container
          docker exec "$NGINX_CTR" sh -c "
            cat > /etc/nginx/conf.d/api-didibaba.conf << 'NGINXEOF'
server {
    listen 80;
    server_name api.didibaba.ai;
    location / {
        proxy_pass http://${HOST_GW}:8000;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
NGINXEOF
            nginx -t && nginx -s reload && echo '✅ nginx reloaded'
          "
        else
          echo "⚠️ No nginx container on :80 — skipping nginx config"
        fi

        echo "🚀 Deploy complete!"
        SSHEOF
