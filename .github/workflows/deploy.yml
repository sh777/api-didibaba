name: Deploy api-didibaba to ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: 1password/load-secrets-action@v2
      with:
        export-env: true
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        SSH_ROOT_PASSWORD: op://didibaba.ai/api-didibaba/SSH_ROOT_PASSWORD
        TRADINGVIEW_USERNAME: op://didibaba.ai/api-didibaba/TRADINGVIEW_USERNAME
        TRADINGVIEW_PASSWORD: op://didibaba.ai/api-didibaba/TRADINGVIEW_PASSWORD

    - name: Install sshpass
      run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass rsync

    - name: Sync code to server
      run: |
        export SSHPASS="$SSH_ROOT_PASSWORD"
        sshpass -e rsync -az --delete \
          --exclude='.git' \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          --exclude='.env' \
          -e "ssh -o StrictHostKeyChecking=no" \
          ./ root@45.77.30.170:/opt/api-didibaba/

    - name: Deploy on server
      run: |
        export SSHPASS="$SSH_ROOT_PASSWORD"
        sshpass -e ssh -o StrictHostKeyChecking=no root@45.77.30.170 bash << REMOTE
        set -e

        echo "⚙️ Writing .env..."
        cat > /opt/api-didibaba/.env <<EOF
        TRADINGVIEW_USERNAME=${TRADINGVIEW_USERNAME}
        TRADINGVIEW_PASSWORD=${TRADINGVIEW_PASSWORD}
        TRADINGVIEW_COOKIES_FILE=/tmp/cookies.json
        EOF

        echo "🐳 Installing Docker if needed..."
        if ! command -v docker &> /dev/null; then
          apt-get update -q
          apt-get install -y docker.io
          systemctl enable docker
          systemctl start docker
        fi

        echo "🌐 Installing nginx if needed..."
        if ! command -v nginx &> /dev/null; then
          apt-get update -q
          apt-get install -y nginx certbot python3-certbot-nginx
        fi

        echo "🛑 Stopping old container..."
        docker stop api-didibaba 2>/dev/null || true
        docker rm api-didibaba 2>/dev/null || true

        echo "🔨 Building image..."
        cd /opt/api-didibaba
        docker build -t api-didibaba .

        echo "🚀 Starting container..."
        docker run -d \
          --name api-didibaba \
          --restart unless-stopped \
          --env-file .env \
          -p 8000:8000 \
          api-didibaba

        echo "⏳ Waiting for startup..."
        sleep 5

        echo "🧪 Health check..."
        curl -sf http://localhost:8000/health && echo "✅ Healthy!" || echo "⚠️ Health check failed"

        echo "🌐 Configuring nginx..."
        cat > /etc/nginx/sites-available/api-didibaba <<'NGINX'
        server {
            listen 80;
            server_name api.didibaba.ai;

            location / {
                proxy_pass http://127.0.0.1:8000;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
            }
        }
        NGINX

        ln -sf /etc/nginx/sites-available/api-didibaba /etc/nginx/sites-enabled/api-didibaba
        nginx -t && systemctl reload nginx || systemctl start nginx

        echo "🔒 Setting up SSL..."
        certbot --nginx -d api.didibaba.ai --non-interactive --agree-tos -m admin@didibaba.ai --redirect 2>/dev/null \
          && echo "✅ SSL configured!" \
          || echo "⚠️ SSL skipped (DNS may not be ready yet)"

        echo "✅ Done! https://api.didibaba.ai/health"
        REMOTE
