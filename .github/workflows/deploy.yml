name: Deploy api-didibaba to ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create deployment package
      run: |
        tar -czf deployment.tar.gz \
          --exclude='.git' \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          --exclude='.env' \
          .

    - name: Copy to server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: 45.77.30.170
        username: root
        key: ${{ secrets.ECS_SSH_KEY }}
        source: "deployment.tar.gz"
        target: "/tmp/"

    - name: Deploy with Docker
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: 45.77.30.170
        username: root
        key: ${{ secrets.ECS_SSH_KEY }}
        script: |
          echo "📦 Extracting files..."
          mkdir -p /opt/api-didibaba
          cd /opt/api-didibaba
          tar -xzf /tmp/deployment.tar.gz
          rm /tmp/deployment.tar.gz

          echo "⚙️ Writing .env..."
          cat > .env <<EOF
          CHART_IMG_API_KEY=${{ secrets.CHART_IMG_API_KEY }}
          TRADINGVIEW_USERNAME=${{ secrets.TRADINGVIEW_USERNAME }}
          TRADINGVIEW_PASSWORD=${{ secrets.TRADINGVIEW_PASSWORD }}
          TRADINGVIEW_COOKIES_FILE=/tmp/cookies.json
          EOF

          echo "🐳 Installing Docker if needed..."
          if ! command -v docker &> /dev/null; then
            apt-get update -q
            apt-get install -y docker.io
            systemctl enable docker
            systemctl start docker
          fi

          echo "🛑 Stopping old container..."
          docker stop api-didibaba 2>/dev/null || true
          docker rm api-didibaba 2>/dev/null || true

          echo "🔨 Building image..."
          docker build -t api-didibaba .

          echo "🚀 Starting container..."
          docker run -d \
            --name api-didibaba \
            --restart unless-stopped \
            --env-file .env \
            -p 8000:8000 \
            api-didibaba

          echo "⏳ Waiting for startup..."
          sleep 5

          echo "🧪 Health check..."
          curl -sf http://localhost:8000/health && echo "✅ Healthy!" || echo "⚠️ Health check failed"

          docker ps | grep api-didibaba
