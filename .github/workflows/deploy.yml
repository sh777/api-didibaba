name: Deploy api-didibaba to ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ECS_USER: root
      ECS_HOST: 45.77.30.170

    steps:
    - uses: actions/checkout@v4

    - uses: 1password/load-secrets-action@v2
      with:
        export-env: true
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        ECS_ROOT_PASSWORD: op://didibaba.ai/api-didibaba/ECS_ROOT_PASSWORD
        TRADINGVIEW_SESSION_ID: op://didibaba.ai/api-didibaba/TRADINGVIEW_SESSION_ID
        TRADINGVIEW_SESSION_ID_SIGN: op://didibaba.ai/api-didibaba/TRADINGVIEW_SESSION_ID_SIGN

    - name: Install sshpass
      run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass rsync

    - name: Sync code to server
      run: |
        export SSHPASS="$ECS_ROOT_PASSWORD"
        sshpass -e rsync -az --delete \
          --exclude='.git' \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          --exclude='.env' \
          -e "ssh -o StrictHostKeyChecking=no" \
          ./ ${{ env.ECS_USER }}@${{ env.ECS_HOST }}:/opt/api-didibaba/

    - name: Deploy on server
      env:
        SSHPASS: ${{ env.ECS_ROOT_PASSWORD }}
      run: |
        sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.ECS_USER }}@${{ env.ECS_HOST }} /bin/bash -s << 'EOF'
        set -e

        # Write .env
        mkdir -p /opt/api-didibaba
        cat > /opt/api-didibaba/.env <<ENVFILE
        TRADINGVIEW_SESSION_ID=$TRADINGVIEW_SESSION_ID
        TRADINGVIEW_SESSION_ID_SIGN=$TRADINGVIEW_SESSION_ID_SIGN
        TRADINGVIEW_COOKIES_FILE=/tmp/cookies.json
        ENVFILE

        # Install nginx if needed
        if ! command -v nginx &>/dev/null; then
          apt-get update -q && apt-get install -y nginx certbot python3-certbot-nginx
        fi

        # Install Docker if needed
        if ! command -v docker &>/dev/null; then
          apt-get update -q && apt-get install -y docker.io
          systemctl enable docker && systemctl start docker
        fi

        # Rebuild and restart container
        docker stop api-didibaba 2>/dev/null || true
        docker rm api-didibaba 2>/dev/null || true
        cd /opt/api-didibaba
        docker build -t api-didibaba .
        docker run -d \
          --name api-didibaba \
          --restart unless-stopped \
          --env-file .env \
          -p 127.0.0.1:8000:8000 \
          api-didibaba

        sleep 5
        curl -sf http://localhost:8000/health && echo " Healthy!" || echo "Health check failed"

        # Configure nginx
        cat > /etc/nginx/sites-available/api-didibaba <<NGINXCONF
        server {
            listen 80;
            server_name api.didibaba.ai;
            location / {
                proxy_pass http://127.0.0.1:8000;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                proxy_read_timeout 120s;
            }
        }
        NGINXCONF

        ln -sf /etc/nginx/sites-available/api-didibaba /etc/nginx/sites-enabled/api-didibaba
        rm -f /etc/nginx/sites-enabled/default
        nginx -t && (systemctl reload nginx 2>/dev/null || systemctl start nginx)

        # SSL
        certbot --nginx -d api.didibaba.ai \
          --non-interactive --agree-tos \
          -m admin@didibaba.ai --redirect 2>&1 \
          && echo "SSL configured!" \
          || echo "SSL skipped (DNS not ready?)"

        echo "Deploy complete!"
        EOF
