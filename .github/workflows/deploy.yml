name: Deploy api-didibaba to ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ECS_USER: root
      ECS_HOST: 45.77.30.170

    steps:
    - uses: actions/checkout@v4

    - uses: 1password/load-secrets-action@v2
      with:
        export-env: true
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        ECS_ROOT_PASSWORD: op://didibaba.ai/api-didibaba/ECS_ROOT_PASSWORD
        TRADINGVIEW_SESSION_ID: op://didibaba.ai/api-didibaba/TRADINGVIEW_SESSION_ID
        TRADINGVIEW_SESSION_ID_SIGN: op://didibaba.ai/api-didibaba/TRADINGVIEW_SESSION_ID_SIGN

    - name: Install sshpass + rsync
      run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass rsync

    - name: Sync code to server
      run: |
        export SSHPASS="$ECS_ROOT_PASSWORD"
        sshpass -e rsync -az --delete \
          --exclude='.git' \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          --exclude='.env' \
          -e "ssh -o StrictHostKeyChecking=no" \
          ./ ${{ env.ECS_USER }}@${{ env.ECS_HOST }}:/opt/api-didibaba/

    - name: Write .env to server
      run: |
        export SSHPASS="$ECS_ROOT_PASSWORD"
        sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.ECS_USER }}@${{ env.ECS_HOST }} \
          "mkdir -p /opt/api-didibaba && printf 'TRADINGVIEW_SESSION_ID=%s\nTRADINGVIEW_SESSION_ID_SIGN=%s\nTRADINGVIEW_COOKIES_FILE=/tmp/cookies.json\n' \
          '${{ env.TRADINGVIEW_SESSION_ID }}' '${{ env.TRADINGVIEW_SESSION_ID_SIGN }}' \
          > /opt/api-didibaba/.env"

    - name: Deploy on server
      run: |
        export SSHPASS="$ECS_ROOT_PASSWORD"
        sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.ECS_USER }}@${{ env.ECS_HOST }} bash -s << 'SSHEOF'
          set -e
          cd /opt/api-didibaba

          # Rebuild api-didibaba container
          docker stop api-didibaba 2>/dev/null || true
          docker rm api-didibaba 2>/dev/null || true
          docker build -t api-didibaba .
          docker run -d \
            --name api-didibaba \
            --restart unless-stopped \
            --env-file .env \
            -p 8000:8000 \
            api-didibaba

          # Wait for api-didibaba to be healthy (pool start is non-blocking, but give uvicorn time)
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8000/health; then
              echo "api-didibaba healthy"
              break
            fi
            echo "Waiting for api-didibaba... ($i/12)"
            sleep 5
          done
          curl -sf http://localhost:8000/health || (docker logs api-didibaba --tail 30; exit 1)

          # Find nginx container (port 80) — docker ps Ports format: "0.0.0.0:80->80/tcp"
          NGINX_CTR=$(docker ps --format '{{.Names}} {{.Ports}}' | grep '0\.0\.0\.0:80->' | awk '{print $1}' | head -1) || true
          echo "nginx container: $NGINX_CTR"

          if [ -n "$NGINX_CTR" ]; then
            # Connect api-didibaba to the same network as nginx so we can proxy by container name
            NGINX_NET=$(docker inspect "$NGINX_CTR" --format='{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' | awk '{print $1}')
            echo "nginx network: $NGINX_NET"
            docker network connect "$NGINX_NET" api-didibaba 2>/dev/null || true

            # Write nginx conf to the persistent volume mount (survives container rebuilds)
            mkdir -p /opt/nginx-extra
            cat > /opt/nginx-extra/api-didibaba.conf << 'NGINXEOF'
server {
    listen 80;
    server_name api.didibaba.ai;
    location / {
        proxy_pass http://api-didibaba:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
NGINXEOF
            docker exec "$NGINX_CTR" sh -c "nginx -t && nginx -s reload"
            echo "nginx reloaded"
          else
            echo "no nginx container on :80"
          fi

          echo "Deploy complete!"
        SSHEOF
